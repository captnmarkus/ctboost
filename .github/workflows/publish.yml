name: Publish

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  release:
    types:
      - published

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            artifact: wheelhouse-linux-x86_64
            cibw_archs: x86_64
          - name: linux-aarch64
            runner: ubuntu-24.04-arm
            artifact: wheelhouse-linux-aarch64
            cibw_archs: aarch64
          - name: windows-amd64
            runner: windows-latest
            artifact: wheelhouse-windows-amd64
            cibw_archs: AMD64
          - name: macos-universal2
            runner: macos-latest
            artifact: wheelhouse-macos-universal2
            cibw_archs: universal2
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip "cibuildwheel==3.4.1"

      - name: Build wheels
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/*.tar.gz

  build_gpu_linux_wheels:
    name: Build GPU Linux wheel
    runs-on: ubuntu-latest
    env:
      CIBW_BUILD: cp310-manylinux_x86_64
      CIBW_CONFIG_SETTINGS: "cmake.define.CTBOOST_ENABLE_CUDA=ON"
      CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
      CIBW_BEFORE_ALL: "yum install -y wget && wget https://developer.download.nvidia.com/compute/cuda/repos/rhel7/x86_64/cuda-rhel7.repo -O /etc/yum.repos.d/cuda.repo && yum clean all && yum -y install cuda-compiler-12-0"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip "cibuildwheel==3.4.1"

      - name: Build GPU Linux wheel
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload GPU Linux wheel artifact
        uses: actions/upload-artifact@v6
        with:
          name: cibw-wheels-gpu-linux
          path: wheelhouse/*.whl

  publish_pypi:
    name: Publish to PyPI
    needs:
      - build_wheels
      - build_sdist
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download Linux CPU wheel artifacts
        uses: actions/download-artifact@v5
        with:
          name: wheelhouse-linux-x86_64
          path: dist

      - name: Download Linux ARM wheel artifacts
        uses: actions/download-artifact@v5
        with:
          name: wheelhouse-linux-aarch64
          path: dist

      - name: Download Windows CPU wheel artifacts
        uses: actions/download-artifact@v5
        with:
          name: wheelhouse-windows-amd64
          path: dist

      - name: Download macOS CPU wheel artifacts
        uses: actions/download-artifact@v5
        with:
          name: wheelhouse-macos-universal2
          path: dist

      - name: Download sdist artifact
        uses: actions/download-artifact@v5
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
