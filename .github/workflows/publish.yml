name: Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheelhouse-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build_gpu_linux_wheels:
    name: Build GPU Linux wheel
    runs-on: ubuntu-latest
    env:
      CIBW_BUILD: cp310-manylinux_x86_64
      CIBW_ENVIRONMENT: "CMAKE_ARGS='-DCTBOOST_ENABLE_CUDA=ON'"
      CIBW_BEFORE_ALL: "yum install -y wget && wget https://developer.download.nvidia.com/compute/cuda/repos/rhel7/x86_64/cuda-rhel7.repo -O /etc/yum.repos.d/cuda.repo && yum clean all && yum -y install cuda-compiler-12-0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel

      - name: Build GPU Linux wheel
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload GPU Linux wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-gpu-linux
          path: wheelhouse/*.whl

  publish_pypi:
    name: Publish to PyPI
    needs:
      - build_wheels
      - build_sdist
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download Linux CPU wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: wheelhouse-ubuntu-latest
          path: dist

      - name: Download Windows CPU wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: wheelhouse-windows-latest
          path: dist

      - name: Download macOS CPU wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: wheelhouse-macos-latest
          path: dist

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
